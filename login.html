<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form validation</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="script.js" type="module"></script>

</head>
<body>
    <div class="2xl:container mx-auto">
        <div class="w-[90%] mx-auto flex justify-center items-center h-screen" >
            <div class="max-w-[500px] w-full border p-6">
                <h1 class=" text-[30px] text-center font-bold">Login</h1>
                <form id="form"class="flex flex-col gap-4">
                    <div class="flex flex-col gap-4">
                        <label for="email" class="text-xl p-2 ">Email</label>
                        <input type="text" id="email" required name="email" placeholder="enter email.."
                        class="outline-none border rounded-lg py-3 pl-2 w-full">
                        <p id="emailError" class="text-red-600 text-sm"></p>
                    </div>
                    <div class="flex flex-col gap-4">
                        <label for="password" class="text-xl">Password</label>
                        <div class="relative w-full">
                           <input type="password" id="password" required name="password" placeholder="enter password.."
                           class="outline-none border rounded-lg py-3 pl-2 w-full">
                           <!-- eye icon button -->
                           <button type="button" id="togglePassword"
                           class="absolute inset-y-0 right-2 flex items-center text-sm text-gray-500">Show</button>
                        </div>
                     <p id="passError"class="text-red-600 text-sm"></p>
                    </div> 

                    <div class="flex flex-col gap-4">
                        <button class="bg-green-500 text-white px-2 py-3 w-full rounded-lg">Login..</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
